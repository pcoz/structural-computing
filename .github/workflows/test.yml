name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest
        run: pytest -v --tb=short

      - name: Verify package imports
        run: python -c "from structural_computing import StructuralComputer; sc = StructuralComputer(); assert sc.count_matchings([(0,1),(1,2),(2,3),(3,0)]) == 2; print('OK')"

  lint:
    name: smoke import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .
      - name: All public symbols import
        run: |
          python -c "
          import structural_computing as sc
          for name in sc.__all__:
              if name != '__version__':
                  assert hasattr(sc, name), f'missing: {name}'
          print(f'OK - {len(sc.__all__)} public symbols')"
